server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /home/saas/app/frontend/dist;
    index index.html;

    client_max_body_size 10M;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff2?|ttf|ico)$ {
        expires 365d;
        access_log off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/blog-frontend.access.log;
    error_log  /var/log/nginx/blog-frontend.error.log;
}

# ---- 2. Backend API ----
server {
    listen 500;
    listen [::]:500;
    server_name _;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    access_log /var/log/nginx/blog-api.access.log;
    error_log  /var/log/nginx/blog-api.error.log;
}
