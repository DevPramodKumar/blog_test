# ============================================================
# BlogPlatform — Nginx (2 separate servers)
#
# Frontend  → port 80  → /home/saas/app/frontend/dist
# API       → port 500 → proxy → Node.js backend (127.0.0.1:5001)
#
# Install:
#   sudo cp nginx/blog-platform.conf /etc/nginx/sites-available/blog-platform
#   sudo ln -sf /etc/nginx/sites-available/blog-platform /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# AWS Security Group: open ports 80 and 500
#
# Frontend build (.env before npm run build):
#   VITE_API_URL=http://43.204.235.182:500/api
# ============================================================

# ---- 1. Frontend (React SPA) ----
server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /home/saas/app/frontend/dist;
    index index.html;

    client_max_body_size 10M;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff2?|ttf|ico)$ {
        expires 365d;
        access_log off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/blog-frontend.access.log;
    error_log  /var/log/nginx/blog-frontend.error.log;
}

# ---- 2. Backend API ----
server {
    listen 500;
    listen [::]:500;
    server_name _;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    access_log /var/log/nginx/blog-api.access.log;
    error_log  /var/log/nginx/blog-api.error.log;
}
