# ============================================================
# BlogPlatform — Nginx Production Config
# ============================================================
# Install:
#   sudo cp nginx/blog-platform.conf /etc/nginx/sites-available/blog-platform
#   sudo ln -sf /etc/nginx/sites-available/blog-platform /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (after DNS points to server):
#   sudo certbot --nginx -d your-domain.com -d www.your-domain.com
#
# IMPORTANT — before npm run build on server, set:
#   /home/saas/app/frontend/.env
#   VITE_API_URL=/api
# ============================================================

upstream blog_backend {
    server 127.0.0.1:5000;
    keepalive 64;
}

# Redirect HTTP → HTTPS (uncomment after SSL is configured)
# server {
#     listen 80;
#     listen [::]:80;
#     server_name your-domain.com www.your-domain.com;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;

    # Frontend build output (React SPA)
    root /home/saas/app/frontend/dist;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Max upload size (for future image uploads)
    client_max_body_size 10M;

    # ---- API → Node.js backend (PM2 on port 5000) ----
    location /api/ {
        proxy_pass http://blog_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check (optional, direct backend access)
    location = /api/health {
        proxy_pass http://blog_backend;
        access_log off;
    }

    # ---- Static assets (Vite hashed files) — long cache ----
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- Google GPT ad script (already in index.html) ----
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ---- React Router SPA fallback ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    access_log /var/log/nginx/blog-platform.access.log;
    error_log  /var/log/nginx/blog-platform.error.log;
}

