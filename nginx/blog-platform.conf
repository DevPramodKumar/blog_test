server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /home/saas/app/frontend/dist;
    index index.html;

    client_max_body_size 10M;

    # API → Node.js backend (PORT=5001 from backend/.env)
    location ^~ /api {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff2?|ttf|ico)$ {
        expires 365d;
        access_log off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/blog-platform.access.log;
    error_log  /var/log/nginx/blog-platform.error.log;
}
